<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#00C2FF" />
    <link rel="canonical" href="https://egysafe.com/" />
    
    <title>Egy Safe | Enterprise Threat Intelligence & ASM</title>
    
    <!-- Preconnects for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://securetoken.googleapis.com" crossorigin />

    <!-- Google Fonts with Display Swap & Subresource Integrity handled by browser via standard link -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Favicon (SVG for high res support) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2300C2FF' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'/%3E%3Cpath d='m9 12 2 2 4-4'/%3E%3C/svg%3E" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Primary Meta Tags -->
    <meta name="title" content="Egy Safe | Enterprise Threat Intelligence & ASM" />
    <meta name="description" content="Egy Safe provides expert cybersecurity services, dark web monitoring, penetration testing, and continuous attack surface management to protect your organization." />
    <meta name="keywords" content="Cybersecurity, Threat Intelligence, Dark Web Monitoring, Penetration Testing, Attack Surface Management, Red Teaming, Egy Safe" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://egysafe.com/" />
    <meta property="og:title" content="Egy Safe | Enterprise Threat Intelligence & ASM" />
    <meta property="og:description" content="Egy Safe provides expert cybersecurity services, dark web monitoring, penetration testing, and continuous attack surface management to protect your organization." />
    <meta property="og:image" content="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1200&h=630&q=80" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://egysafe.com/" />
    <meta property="twitter:title" content="Egy Safe | Enterprise Threat Intelligence & ASM" />
    <meta property="twitter:description" content="Egy Safe provides expert cybersecurity services, dark web monitoring, penetration testing, and continuous attack surface management to protect your organization." />
    <meta property="twitter:image" content="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&w=1200&h=630&q=80" />

    <!-- Google Analytics 4 Loader -->
    <script>
      (function() {
        const gaId = "%VITE_GA_ID%"; // Replaced by Vite at build time
        if (gaId && gaId.startsWith('G-')) {
          const script = document.createElement('script');
          script.async = true;
          script.src = 'https://www.googletagmanager.com/gtag/js?id=' + gaId;
          document.head.appendChild(script);

          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
          
          // IP Anonymization is enabled by default in GA4, but we explicitly set it for GDPR compliance
          gtag('config', gaId, { 'anonymize_ip': true });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
